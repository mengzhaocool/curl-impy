name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: sudo apt-get update && sudo apt-get install -y cmake ninja-build nasm pkg-config xz-utils unzip libpsl-dev libidn2-dev
      - run: chmod +x ci/build_unix.sh
      - run: PLATFORM=linux_x64 LIB_EXT=so bash ci/build_unix.sh .
      - uses: actions/upload-artifact@v4
        with:
          name: lib-linux_x64
          path: curl_impy/libs/linux_x64/*

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: brew install cmake ninja nasm pkg-config
      - run: chmod +x ci/build_unix.sh
      - run: PLATFORM=macos_universal LIB_EXT=dylib CC=clang bash ci/build_unix.sh .
      - uses: actions/upload-artifact@v4
        with:
          name: lib-macos_universal
          path: curl_impy/libs/macos_universal/*

  package:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          mkdir -p curl_impy/libs/linux_x64 curl_impy/libs/macos_universal
          cp artifacts/lib-linux_x64/* curl_impy/libs/linux_x64/ 2>/dev/null || true
          cp artifacts/lib-macos_universal/* curl_impy/libs/macos_universal/ 2>/dev/null || true
          ls -la curl_impy/libs/*/
      - run: pip install build && python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
